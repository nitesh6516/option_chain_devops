version: '3.8'

x-logging:
  &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ==========================================
  # INFRASTRUCTURE & GATEWAY
  # ==========================================
  nginx-gateway:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx-gateway
    ports:
      - "80:80"
      - "443:443"
    networks:
      - optionchain-net
    depends_on:
      frontend-service:
        condition: service_started
      auth-service:
        condition: service_started
      market-data-service:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging

  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: optionchain_admin
      POSTGRES_PASSWORD: enterprise_secure_password
      POSTGRES_DB: optionchain_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - optionchain-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optionchain_admin -d optionchain_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ==========================================
  # MICROSERVICES
  # ==========================================
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/optionchain_db
      - SPRING_DATASOURCE_USERNAME=optionchain_admin
      - SPRING_DATASOURCE_PASSWORD=enterprise_secure_password
      - JWT_SECRET=enterprise_grade_jwt_secret_key_2026_secure
    networks:
      - optionchain-net
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: on-failure
    logging: *default-logging

  analysis-service:
    build:
      context: ./analysis-service
      dockerfile: Dockerfile
    container_name: analysis-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/optionchain_db
      - SPRING_DATASOURCE_USERNAME=optionchain_admin
      - SPRING_DATASOURCE_PASSWORD=enterprise_secure_password
    networks:
      - optionchain-net
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: on-failure

  ml-prediction-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: ml-prediction-service
    environment:
      - MODEL_VERSION=v2.1_randomforest
      - WORKERS=4
    networks:
      - optionchain-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  market-data-service:
    build:
      context: ./market-data-service
      dockerfile: Dockerfile
    container_name: market-data-service
    environment:
      - PORT=4100
      - MARKET_CACHE_TTL_MS=10000
    ports:
      - "4100:4100"
    networks:
      - optionchain-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging: *default-logging

  frontend-service:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-service
    networks:
      - optionchain-net
    depends_on:
      market-data-service:
        condition: service_started
    restart: unless-stopped

  # ==========================================
  # OBSERVABILITY & MONITORING
  # ==========================================
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - optionchain-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.0.3
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - optionchain-net
    depends_on:
      - prometheus
    restart: unless-stopped

  # ==========================================
  # ELK STACK (LOGGING)
  # ==========================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.9.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - optionchain-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.9.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - optionchain-net
    depends_on:
      - elasticsearch

  # ==========================================
  # CI/CD
  # ==========================================
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - optionchain-net
    restart: unless-stopped

networks:
  optionchain-net:
    driver: bridge
    name: optionchain_enterprise_network

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  elasticsearch_data:
  jenkins_data:
